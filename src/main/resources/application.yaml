spring:
  application:
    name: ai-interviewer

  datasource:
    url: jdbc:h2:mem:interviewdb;MODE=MySQL
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console
      settings:
        web-allow-others: true

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

  ai:
    ollama:
      base-url: http://localhost:11434
      chat:
        options:
          model: gemma2:2b # 본인이 다운로드한 Ollama 모델명 입력
          temperature: 0.7 # 답변의 창의성 조절 (0.7 내외가 적당)